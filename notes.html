<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notes Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    :root {
      --nm-bg: #0f1115;
      --nm-panel: rgba(255, 255, 255, 0.06);
      --nm-border: rgba(255, 255, 255, 0.12);
      --nm-accent: #5ad3b7;
      --nm-warn: #f6c453;
      --nm-danger: #ff6b6b;
      --nm-text: #e8eef2;
      --nm-muted: rgba(232, 238, 242, 0.65);
      --nm-code: rgba(0, 0, 0, 0.35);
    }

    body {
      background: radial-gradient(1200px 600px at 20% -10%, #1c2330 0%, #0f1115 60%, #0b0c10 100%);
      color: var(--nm-text);
      min-height: 100vh;
    }

    html {
      scroll-behavior: smooth;
    }

    .nm-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .nm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .nm-title h1 {
      font-size: 28px;
      margin: 0 0 6px;
    }

    .nm-title p {
      margin: 0;
      color: var(--nm-muted);
      font-size: 14px;
    }

    .nm-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nm-actions button,
    .nm-actions a {
      border: 1px solid var(--nm-border);
      background: var(--nm-panel);
      color: var(--nm-text);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .nm-actions button:hover,
    .nm-actions a:hover {
      border-color: var(--nm-accent);
      box-shadow: 0 6px 20px rgba(90, 211, 183, 0.18);
      transform: translateY(-1px);
    }

    .nm-layout {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(0, 2fr);
      gap: 20px;
    }

    .nm-panel {
      background: var(--nm-panel);
      border: 1px solid var(--nm-border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .nm-panel h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    .nm-filter {
      display: grid;
      gap: 12px;
    }

    .nm-filter input,
    .nm-filter select {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--nm-border);
      color: var(--nm-text);
      padding: 10px 12px;
      border-radius: 10px;
    }

    .nm-list {
      display: grid;
      gap: 12px;
      max-height: 65vh;
      overflow: auto;
      padding-right: 6px;
    }

    .nm-note-card {
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nm-note-card:hover {
      border-color: var(--nm-accent);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
      transform: translateY(-2px);
    }

    .nm-note-card.active {
      border-color: var(--nm-accent);
      background: rgba(90, 211, 183, 0.08);
    }

    .nm-note-card h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .nm-note-meta {
      font-size: 12px;
      color: var(--nm-muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nm-editor {
      display: grid;
      gap: 16px;
    }

    .nm-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .nm-editor input,
    .nm-editor textarea {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--nm-border);
      color: var(--nm-text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .nm-editor textarea {
      min-height: 260px;
      resize: vertical;
      font-family: "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .nm-tag-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .nm-tag {
      border: 1px solid var(--nm-border);
      color: var(--nm-muted);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
    }

    .nm-editor-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nm-primary {
      background: var(--nm-accent);
      color: #06211b;
      border-color: transparent;
    }

    .nm-warn {
      border-color: var(--nm-warn);
      color: var(--nm-warn);
    }

    .nm-danger {
      border-color: var(--nm-danger);
      color: var(--nm-danger);
    }

    .nm-preview {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--nm-border);
      border-radius: 12px;
      padding: 16px;
      min-height: 180px;
      color: var(--nm-text);
      line-height: 1.6;
    }

    .nm-toc {
      margin: 10px 0 14px;
      padding: 10px 12px;
      border: 1px dashed var(--nm-border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--nm-muted);
      display: none;
      position: sticky;
      top: 12px;
      background: rgba(15, 17, 21, 0.6);
      backdrop-filter: blur(6px);
      z-index: 1;
    }

    .nm-toc a {
      color: var(--nm-text);
      text-decoration: none;
    }

    .nm-toc a:hover {
      text-decoration: underline;
    }

    .nm-toc a.active {
      color: var(--nm-accent);
      font-weight: 700;
    }

    .nm-toc ul {
      list-style: none;
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }

    .nm-toc .toc-h2 {
      margin-left: 12px;
      font-size: 12px;
    }

    .nm-toc .toc-h3 {
      margin-left: 24px;
      font-size: 11px;
    }

    .nm-preview h1,
    .nm-preview h2,
    .nm-preview h3 {
      margin-top: 16px;
    }

    .nm-preview p {
      margin: 10px 0;
    }

    .nm-preview a {
      color: var(--nm-accent);
      text-decoration: none;
    }

    .nm-preview a:hover {
      text-decoration: underline;
    }

    .nm-preview code {
      background: var(--nm-code);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .nm-preview pre {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--nm-border);
      padding: 12px;
      border-radius: 12px;
      overflow: auto;
      margin: 12px 0;
    }

    .nm-preview pre code {
      background: transparent;
      padding: 0;
      display: block;
      color: #e9f2ff;
      font-size: 12px;
      line-height: 1.6;
      font-family: "JetBrains Mono", "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .nm-preview pre code .kw { color: #82aaff; }
    .nm-preview pre code .fn { color: #c792ea; }
    .nm-preview pre code .str { color: #c3e88d; }
    .nm-preview pre code .num { color: #f78c6c; }
    .nm-preview pre code .com { color: #7f8ea3; font-style: italic; }

    .nm-preview blockquote {
      border-left: 3px solid var(--nm-accent);
      padding: 8px 12px;
      margin: 12px 0;
      color: var(--nm-muted);
      background: rgba(90, 211, 183, 0.08);
      border-radius: 8px;
    }

    .nm-preview ul,
    .nm-preview ol {
      margin: 10px 0 10px 20px;
      display: grid;
      gap: 6px;
    }

    .nm-preview img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--nm-border);
      margin: 8px 0;
    }

    .nm-footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--nm-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media (max-width: 900px) {
      .nm-layout {
        grid-template-columns: 1fr;
      }

      .nm-list {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="nm-shell">
    <header class="nm-header">
      <div class="nm-title">
        <h1>Notes Library</h1>
        <p>浏览与阅读 content/notes 下的 Markdown 笔记</p>
      </div>
      <div class="nm-actions">
        <button id="loadIndexBtn">重新加载索引</button>
        <a href="index.html" title="返回主页">返回主页</a>
      </div>
    </header>

    <div class="nm-layout">
      <section class="nm-panel">
        <h2>笔记列表</h2>
        <div class="nm-filter">
          <input id="searchInput" type="search" placeholder="搜索标题 / 标签 / 内容" />
          <select id="topicFilter">
            <option value="">全部主题</option>
          </select>
          <select id="sortSelect">
            <option value="updated">按更新时间</option>
            <option value="title">按标题</option>
          </select>
        </div>
        <div id="noteList" class="nm-list"></div>
      </section>

      <section class="nm-panel">
        <h2>阅读</h2>
        <div class="nm-editor">
          <div>
            <strong id="detailTitle">选择一篇笔记</strong>
            <div id="detailMeta" class="nm-note-meta" style="margin-top:6px;"></div>
            <div id="detailTags" class="nm-tag-list" style="margin-top:10px;"></div>
          </div>
          <div>
            <strong>内容</strong>
            <div id="toc" class="nm-toc"></div>
            <div id="preview" class="nm-preview">从左侧选择一篇笔记进行阅读。</div>
          </div>
          <div class="nm-footer">
            <span id="statusText">未加载</span>
            <span>提示：从 data/search.json 读取索引</span>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      notes: [],
      activeId: null,
      searchIndex: null,
    };

    const els = {
      noteList: document.getElementById('noteList'),
      searchInput: document.getElementById('searchInput'),
      topicFilter: document.getElementById('topicFilter'),
      sortSelect: document.getElementById('sortSelect'),
      detailTitle: document.getElementById('detailTitle'),
      detailMeta: document.getElementById('detailMeta'),
      detailTags: document.getElementById('detailTags'),
      toc: document.getElementById('toc'),
      preview: document.getElementById('preview'),
      statusText: document.getElementById('statusText'),
      loadIndexBtn: document.getElementById('loadIndexBtn'),
    };

    function setStatus(text) {
      els.statusText.textContent = text;
    }

    async function loadIndex() {
      try {
        setStatus('正在加载索引...');
        const res = await fetch('data/search.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('无法读取 data/search.json');
        const json = await res.json();
        state.searchIndex = json;
        state.notes = json.items || [];
        setStatus(`已加载 ${state.notes.length} 条记录`);
        renderTopics();
        renderList();
      } catch (err) {
        console.error(err);
        setStatus('加载失败，请检查 data/search.json');
      }
    }

    function renderTopics() {
      const topics = Array.from(new Set(state.notes.map(n => n.topic).filter(Boolean))).sort();
      els.topicFilter.innerHTML = '<option value="">全部主题</option>' + topics.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    function getFilteredNotes() {
      const query = els.searchInput.value.trim().toLowerCase();
      const topic = els.topicFilter.value;
      const sortBy = els.sortSelect.value;

      let list = [...state.notes];
      if (topic) list = list.filter(note => note.topic === topic);
      if (query) {
        list = list.filter(note => {
          const haystack = `${note.title} ${note.text} ${(note.tags || []).join(' ')}`.toLowerCase();
          return haystack.includes(query);
        });
      }

      if (sortBy === 'title') {
        list.sort((a, b) => a.title.localeCompare(b.title, 'zh-Hans-CN'));
      } else {
        list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      }

      return list;
    }

    function renderList() {
      const list = getFilteredNotes();
      if (!list.length) {
        els.noteList.innerHTML = '<div class="nm-note-card">没有匹配的笔记</div>';
        return;
      }
      els.noteList.innerHTML = list.map(note => {
        const isActive = note.id === state.activeId;
        return `
          <div class="nm-note-card ${isActive ? 'active' : ''}" data-id="${note.id}">
            <h3>${note.title}</h3>
            <div class="nm-note-meta">
              <span>ID: ${note.id}</span>
              <span>主题: ${note.topic || '未分类'}</span>
              <span>更新: ${note.updatedAt}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function slugifyHeading(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\-\u4e00-\u9fa5]/g, '')
        .replace(/\-+/g, '-');
    }

    function buildToc(content) {
      const lines = content.split('\n');
      const items = [];
      lines.forEach(line => {
        const match = /^(#{1,3})\s+(.*)$/.exec(line.trim());
        if (!match) return;
        const level = match[1].length;
        const title = match[2].trim();
        const id = slugifyHeading(title);
        items.push({ level, title, id });
      });
      if (!items.length) {
        els.toc.style.display = 'none';
        els.toc.innerHTML = '';
        return;
      }
      const list = items.map(item => {
        const cls = item.level === 1 ? '' : item.level === 2 ? 'toc-h2' : 'toc-h3';
        return `<li class="${cls}"><a href="#${item.id}">${item.title}</a></li>`;
      }).join('');
      els.toc.innerHTML = `<strong>目录</strong><ul>${list}</ul>`;
      els.toc.style.display = 'block';
    }

    function initScrollSpy() {
      if (!els.toc || els.toc.style.display === 'none') return;
      const headings = Array.from(els.preview.querySelectorAll('h1, h2, h3'));
      if (!headings.length) return;
      const tocLinks = Array.from(els.toc.querySelectorAll('a'));
      const map = new Map(tocLinks.map(link => [decodeURIComponent(link.getAttribute('href').slice(1)), link]));

      const onScroll = () => {
        let current = headings[0];
        const offset = 120;
        headings.forEach(h => {
          if (h.getBoundingClientRect().top - offset <= 0) current = h;
        });
        tocLinks.forEach(link => link.classList.remove('active'));
        const activeLink = map.get(current.id);
        if (activeLink) activeLink.classList.add('active');
      };

      window.removeEventListener('scroll', window.__tocScrollHandler);
      window.__tocScrollHandler = onScroll;
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }

    function highlightCode(code, lang) {
      const escaped = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      const patterns = [
        { re: /(\/\/.*$)/gm, cls: 'com' },
        { re: /(\/\*[\s\S]*?\*\/)/gm, cls: 'com' },
        { re: /(["'`])(?:\\.|(?!\1).)*\1/gm, cls: 'str' },
        { re: /\b(\d+(\.\d+)?)\b/gm, cls: 'num' },
      ];
      let output = escaped;
      const kwList = /(const|let|var|function|return|if|else|for|while|switch|case|break|continue|class|new|try|catch|finally|throw|async|await|import|export|from|default|extends|super|this|true|false|null|undefined)\b/g;
      output = output.replace(kwList, '<span class="kw">$1</span>');
      patterns.forEach(({ re, cls }) => {
        output = output.replace(re, `<span class="${cls}">$1</span>`);
      });
      output = output.replace(/\b([A-Za-z_][A-Za-z0-9_]*)\s*(?=\()/g, '<span class="fn">$1</span>');
      return output;
    }

    function renderPreview(content) {
      buildToc(content || '');
      const codeBlocks = [];
      let html = content.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
        const klass = lang ? ` class="lang-${lang}"` : '';
        const highlighted = highlightCode(code, lang);
        const rendered = `<pre><code${klass}>${highlighted}</code></pre>`;
        const token = `@@CODE${codeBlocks.length}@@`;
        codeBlocks.push(rendered);
        return token;
      });

      const lines = html.split('\n');
      const out = [];
      let inUl = false;
      let inOl = false;
      const closeLists = () => {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
      };
      for (const line of lines) {
        if (/^\s*[-*+]\s+/.test(line)) {
          if (!inUl) { closeLists(); out.push('<ul>'); inUl = true; }
          out.push(`<li>${line.replace(/^\s*[-*+]\s+/, '')}</li>`);
          continue;
        }
        if (/^\s*\d+\.\s+/.test(line)) {
          if (!inOl) { closeLists(); out.push('<ol>'); inOl = true; }
          out.push(`<li>${line.replace(/^\s*\d+\.\s+/, '')}</li>`);
          continue;
        }
        closeLists();
        out.push(line);
      }
      closeLists();
      html = out.join('\n')
        .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
        .replace(/^### (.*$)/gim, (_, title) => `<h3 id="${slugifyHeading(title)}">${title}</h3>`)
        .replace(/^## (.*$)/gim, (_, title) => `<h2 id="${slugifyHeading(title)}">${title}</h2>`)
        .replace(/^# (.*$)/gim, (_, title) => `<h1 id="${slugifyHeading(title)}">${title}</h1>`)
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/gim, '<img alt="$1" src="$2" />')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/gim, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
        .replace(/\*(.*)\*/gim, '<em>$1</em>')
        .replace(/`([^`]+)`/gim, '<code>$1</code>')
        .replace(/\n\n/gim, '</p><p>')
        .replace(/\n/gim, '<br>');
      codeBlocks.forEach((block, idx) => {
        html = html.replace(`@@CODE${idx}@@`, block);
      });
      html = `<p>${html}</p>`;
      els.preview.innerHTML = html;
      initScrollSpy();
    }

    async function setActiveNote(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      state.activeId = id;
      els.detailTitle.textContent = note.title;
      els.detailMeta.innerHTML = `
        <span>ID: ${note.id}</span>
        <span>主题: ${note.topic || '未分类'}</span>
        <span>更新: ${note.updatedAt || '-'}</span>
      `;
      els.detailTags.innerHTML = (note.tags || []).map(tag => `<span class="nm-tag">${tag}</span>`).join('');
      if (!note.content && note.path) {
        try {
          const res = await fetch(note.path, { cache: 'no-store' });
          if (!res.ok) throw new Error('无法读取 Markdown 文件');
          note.content = await res.text();
        } catch (err) {
          console.error(err);
          els.preview.textContent = '读取 Markdown 失败，请检查路径。';
          renderList();
          return;
        }
      }
      renderPreview(note.content || '');
      renderList();
    }

    els.noteList.addEventListener('click', (e) => {
      const card = e.target.closest('.nm-note-card');
      if (!card || !card.dataset.id) return;
      setActiveNote(card.dataset.id);
    });

    ['input', 'change'].forEach(evt => {
      els.searchInput.addEventListener(evt, renderList);
      els.topicFilter.addEventListener(evt, renderList);
      els.sortSelect.addEventListener(evt, renderList);
    });

    els.loadIndexBtn.addEventListener('click', loadIndex);

    loadIndex();
  </script>
</body>
</html>
