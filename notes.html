<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alsay Notes Manager</title>
  <meta name="description" content="Alsay 的笔记管理与知识库，支持双向链接、全文检索与主题切换。">
  <meta name="keywords" content="Alsay, 笔记管理, 知识库, 双向链接, 全文检索">
  <meta name="author" content="Alsay">
  <meta name="robots" content="index, follow">
  <meta name="baiduspider" content="index, follow">
  <meta name="applicable-device" content="pc,mobile">
  <link rel="canonical" href="https://mzjh.top/notes.html">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mzjh.top/notes.html">
  <meta property="og:title" content="Alsay Notes Manager">
  <meta property="og:description" content="笔记管理与知识库，支持双向链接、全文检索与主题切换。">
  <meta property="og:image" content="https://mzjh.top/images/logo.png">
  <meta property="og:site_name" content="Alsay">
  <meta property="og:locale" content="zh_CN">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://mzjh.top/notes.html">
  <meta name="twitter:title" content="Alsay Notes Manager">
  <meta name="twitter:description" content="笔记管理与知识库，支持双向链接、全文检索与主题切换。">
  <meta name="twitter:image" content="https://mzjh.top/images/logo.png">
  <link rel="sitemap" type="application/xml" title="Sitemap" href="https://mzjh.top/sitemap.xml">
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    :root {
      --nm-bg: #0f1115;
      --nm-panel: rgba(255, 255, 255, 0.06);
      --nm-border: rgba(255, 255, 255, 0.12);
      --nm-accent: #5ad3b7;
      --nm-warn: #f6c453;
      --nm-danger: #ff6b6b;
      --nm-text: #e8eef2;
      --nm-muted: rgba(232, 238, 242, 0.65);
      --nm-code: rgba(0, 0, 0, 0.35);
      --nm-font-size: 15px;
      --nm-line-height: 1.7;
    }

    body.theme-warm {
      background: radial-gradient(1200px 600px at 20% -10%, #2c241a 0%, #1a1510 60%, #0f0c0a 100%);
    }

    body.theme-warm .nm-panel,
    body.theme-warm .nm-actions button,
    body.theme-warm .nm-actions a,
    body.theme-warm .nm-note-card,
    body.theme-warm .nm-preview {
      background: rgba(255, 248, 236, 0.08);
      border-color: rgba(255, 217, 170, 0.2);
    }

    body.theme-warm .nm-preview {
      color: #f4eadc;
    }

    body.theme-warm .nm-preview a {
      color: #ffd18a;
    }

    body.theme-warm .nm-toc {
      background: rgba(32, 25, 18, 0.8);
    }

    body {
      background: radial-gradient(1200px 600px at 20% -10%, #1c2330 0%, #0f1115 60%, #0b0c10 100%);
      color: var(--nm-text);
      min-height: 100vh;
    }

    html {
      scroll-behavior: smooth;
    }

    .nm-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--nm-accent), #8ad7ff);
      z-index: 999;
      box-shadow: 0 2px 8px rgba(90, 211, 183, 0.4);
    }

    .nm-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .nm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .nm-title h1 {
      font-size: 28px;
      margin: 0 0 6px;
    }

    .nm-title p {
      margin: 0;
      color: var(--nm-muted);
      font-size: 14px;
    }

    .nm-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nm-actions button,
    .nm-actions a {
      border: 1px solid var(--nm-border);
      background: var(--nm-panel);
      color: var(--nm-text);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .nm-actions button:hover,
    .nm-actions a:hover {
      border-color: var(--nm-accent);
      box-shadow: 0 6px 20px rgba(90, 211, 183, 0.18);
      transform: translateY(-1px);
    }

    .nm-layout {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(0, 2fr) minmax(200px, 0.9fr);
      gap: 20px;
    }

    body.focus-mode .nm-layout {
      grid-template-columns: minmax(0, 1fr);
    }

    body.focus-mode .nm-panel:first-child,
    body.focus-mode .nm-toc-panel {
      display: none;
    }

    body.focus-mode .nm-panel:last-child {
      max-width: var(--nm-read-width, 900px);
      margin: 0 auto;
    }

    body.focus-mode {
      background: radial-gradient(900px 500px at 20% -10%, #161a22 0%, #0f1115 60%, #0b0c10 100%);
    }

    body.focus-mode #tocToggleBtn,
    body.focus-mode #tocAutoBtn {
      display: none;
    }

    body.focus-mode .nm-reader-tools .compact-hide {
      display: none;
    }

    .nm-width-slider {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--nm-muted);
    }

    .nm-width-slider input[type="range"] {
      accent-color: var(--nm-accent);
    }

    .nm-panel {
      background: var(--nm-panel);
      border: 1px solid var(--nm-border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .nm-panel h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    .nm-filter {
      display: grid;
      gap: 12px;
    }

    .nm-filter input,
    .nm-filter select {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--nm-border);
      color: var(--nm-text);
      padding: 10px 12px;
      border-radius: 10px;
    }

    .nm-list {
      display: grid;
      gap: 12px;
      max-height: 65vh;
      overflow: auto;
      padding-right: 6px;
    }

    .nm-note-card {
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nm-note-card:hover {
      border-color: var(--nm-accent);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
      transform: translateY(-2px);
    }

    .nm-note-card.active {
      border-color: var(--nm-accent);
      background: rgba(90, 211, 183, 0.08);
    }

    .nm-note-card h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .nm-note-meta {
      font-size: 12px;
      color: var(--nm-muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nm-editor {
      display: grid;
      gap: 16px;
    }

    .nm-reader-tools {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .nm-tool-group {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 4px;
      border: 1px solid var(--nm-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
    }

    .nm-reader-tools button {
      padding: 6px 8px;
      font-size: 11px;
      border-radius: 999px;
    }

    .nm-reader-tools .nm-width-slider {
      margin-left: auto;
    }

    .nm-reader-tools button {
      border: 1px solid var(--nm-border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--nm-text);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nm-reader-tools button:focus,
    .nm-reader-tools button:focus-visible {
      outline: 2px solid var(--nm-accent);
      outline-offset: 2px;
    }

    .nm-reader-tools button:hover {
      background: rgba(90, 211, 183, 0.15);
      border-color: var(--nm-accent);
    }

    .nm-note-card:focus,
    .nm-note-card:focus-visible {
      outline: 2px solid var(--nm-accent);
      outline-offset: 2px;
    }

    /* 加载动画 */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .nm-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--nm-muted);
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* 键盘快捷键提示 */
    .shortcut-hint {
      font-size: 10px;
      color: var(--nm-muted);
      margin-left: 4px;
      padding: 2px 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    /* 阅读进度条 */
    .nm-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: var(--nm-accent);
      transition: width 0.1s ease-out;
      z-index: 1001;
      box-shadow: 0 2px 8px rgba(90, 211, 183, 0.4);
    }

    .nm-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .nm-editor input,
    .nm-editor textarea {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--nm-border);
      color: var(--nm-text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .nm-editor textarea {
      min-height: 260px;
      resize: vertical;
      font-family: "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .nm-tag-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .nm-tag {
      border: 1px solid var(--nm-border);
      color: var(--nm-muted);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
    }

    .nm-editor-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nm-primary {
      background: var(--nm-accent);
      color: #06211b;
      border-color: transparent;
    }

    .nm-warn {
      border-color: var(--nm-warn);
      color: var(--nm-warn);
    }

    .nm-danger {
      border-color: var(--nm-danger);
      color: var(--nm-danger);
    }

    .nm-preview {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--nm-border);
      border-radius: 12px;
      padding: 16px;
      min-height: 180px;
      color: var(--nm-text);
      line-height: var(--nm-line-height);
      font-size: var(--nm-font-size);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .nm-toc {
      margin: 10px 0 0;
      padding: 10px 12px;
      border: 1px dashed var(--nm-border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--nm-muted);
      display: none;
      position: sticky;
      top: 12px;
      background: rgba(15, 17, 21, 0.6);
      backdrop-filter: blur(6px);
      z-index: 1;
    }

    .nm-toc-panel h2 {
      margin-bottom: 8px;
    }

    .nm-toc a {
      color: var(--nm-text);
      text-decoration: none;
    }

    .nm-toc a:hover {
      text-decoration: underline;
    }

    .nm-toc a.active {
      color: var(--nm-accent);
      font-weight: 700;
    }

    .nm-toc ul {
      list-style: none;
      display: grid;
      gap: 6px;
      margin-top: 8px;
      max-height: 65vh;
      overflow: auto;
      padding-right: 6px;
    }

    .nm-toc .toc-h2 {
      margin-left: 12px;
      font-size: 12px;
    }

    .nm-toc .toc-h3 {
      margin-left: 24px;
      font-size: 11px;
    }

    .nm-toc .toc-group {
      border-left: 2px solid rgba(90, 211, 183, 0.2);
      padding-left: 8px;
      margin: 6px 0;
    }

    .nm-toc .toc-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--nm-text);
      font-weight: 600;
      font-size: 12px;
    }

    .nm-toc .toc-toggle::before {
      content: "▾";
      font-size: 12px;
      opacity: 0.7;
      transition: transform 0.2s ease;
    }

    .nm-toc .toc-group.collapsed .toc-toggle::before {
      transform: rotate(-90deg);
    }

    .nm-toc .toc-group.collapsed ul {
      display: none;
    }

    .nm-preview h1,
    .nm-preview h2,
    .nm-preview h3 {
      margin-top: 16px;
    }

    .nm-preview p {
      margin: 10px 0;
    }

    .nm-preview p.anchor {
      position: relative;
      padding-left: 18px;
    }

    .nm-preview p.anchor::before {
      content: "¶";
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0.3;
      font-size: 12px;
    }

    .nm-preview p.anchor.active {
      background: rgba(90, 211, 183, 0.12);
      border-left: 3px solid var(--nm-accent);
      padding-left: 12px;
      border-radius: 8px;
    }

    .nm-preview a {
      color: var(--nm-accent);
      text-decoration: none;
    }

    .nm-preview a:hover {
      text-decoration: underline;
    }

    .nm-preview code {
      background: var(--nm-code);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .nm-preview pre {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--nm-border);
      padding: 12px;
      border-radius: 12px;
      overflow: auto;
      margin: 12px 0;
      max-width: 100%;
      box-sizing: border-box;
    }

    .nm-preview pre code {
      background: transparent;
      padding: 0;
      display: block;
      color: #e9f2ff;
      font-size: 12px;
      line-height: 1.6;
      font-family: "JetBrains Mono", "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      white-space: pre;
    }

    .nm-preview pre.code-wrap code {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .nm-preview pre code .kw { color: #89ddff; }
    .nm-preview pre code .fn { color: #82aaff; }
    .nm-preview pre code .str { color: #c3e88d; }
    .nm-preview pre code .num { color: #f78c6c; }
    .nm-preview pre code .com { color: #546e7a; font-style: italic; }
    .nm-preview pre code .bi { color: #ffcb6b; }
    .nm-preview pre code .sel { color: #f07178; }
    .nm-preview pre code .prop { color: #82aaff; }

    .nm-preview blockquote {
      border-left: 3px solid var(--nm-accent);
      padding: 8px 12px;
      margin: 12px 0;
      color: var(--nm-muted);
      background: rgba(90, 211, 183, 0.08);
      border-radius: 8px;
    }

    .nm-preview ul,
    .nm-preview ol {
      margin: 10px 0 10px 20px;
      display: grid;
      gap: 6px;
    }

    .nm-preview img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--nm-border);
      margin: 8px 0;
      cursor: zoom-in;
    }

    .nm-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .nm-lightbox.open {
      display: flex;
    }

    .nm-lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .nm-lightbox-close {
      position: absolute;
      top: 18px;
      right: 18px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .nm-footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--nm-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media (max-width: 900px) {
      .nm-layout {
        grid-template-columns: 1fr;
      }

      .nm-list {
        max-height: none;
      }

      .nm-toc {
        position: static;
      }

      .nm-toc-panel {
        display: none;
      }

      .nm-toc-panel.open {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div id="progressBar" class="nm-progress"></div>
  <div id="lightbox" class="nm-lightbox" aria-hidden="true">
    <button id="lightboxClose" class="nm-lightbox-close">×</button>
    <img id="lightboxImg" alt="preview">
  </div>
  <div class="nm-shell">
    <header class="nm-header">
      <div class="nm-title">
        <h1>Notes Library</h1>
        <p>浏览与阅读 content/notes 下的 Markdown 笔记</p>
      </div>
      <div class="nm-actions">
        <button id="loadIndexBtn">重新加载索引</button>
        <a href="index.html" title="返回主页">返回主页</a>
      </div>
    </header>

    <div class="nm-layout">
      <section class="nm-panel">
        <h2>笔记列表</h2>
        <div class="nm-filter">
          <input id="searchInput" type="search" placeholder="搜索标题 / 标签 / 内容" />
          <select id="topicFilter">
            <option value="">全部主题</option>
          </select>
          <select id="sortSelect">
            <option value="updated">按更新时间</option>
            <option value="title">按标题</option>
          </select>
        </div>
        <div id="noteList" class="nm-list"></div>
      </section>

      <section class="nm-panel">
        <h2>阅读</h2>
        <div class="nm-editor">
          <div>
            <strong id="detailTitle">选择一篇笔记</strong>
            <div id="detailMeta" class="nm-note-meta" style="margin-top:6px;"></div>
            <div id="detailTags" class="nm-tag-list" style="margin-top:10px;"></div>
          </div>
          <div>
            <strong>内容</strong>
            <div class="nm-reader-tools">
              <div class="nm-tool-group">
                <button id="fontDecBtn">A-</button>
                <button id="fontIncBtn">A+</button>
                <button id="lineDecBtn" class="compact-hide">行距-</button>
                <button id="lineIncBtn" class="compact-hide">行距+</button>
              </div>
              <div class="nm-tool-group compact-hide">
                <button id="tocToggleBtn" title="目录">目录</button>
                <button id="tocAutoBtn" title="目录自动折叠">折叠</button>
              </div>
              <div class="nm-tool-group compact-hide">
                <button id="wrapToggleBtn" title="代码自动换行">换行</button>
                <button id="themeToggleBtn" title="切换主题">🌙</button>
              </div>
              <label class="nm-width-slider">
                宽度
                <input id="widthRange" type="range" min="640" max="1200" step="40" />
              </label>
              <div class="nm-tool-group">
                <button id="focusToggleBtn" title="专注阅读">🔍</button>
                <button id="resetReaderBtn">重置</button>
              </div>
            </div>
            <div id="preview" class="nm-preview">从左侧选择一篇笔记进行阅读。</div>
          </div>
          <div class="nm-footer">
            <span id="statusText">未加载</span>
            <span>快捷键: <span class="shortcut-hint">J/K</span> 导航 · <span class="shortcut-hint">Ctrl+G</span> 搜索 · <span class="shortcut-hint">T</span> 主题 · <span class="shortcut-hint">W</span> 换行 · <span class="shortcut-hint">F</span> 专注(🔍) · <span class="shortcut-hint">Esc</span> 清除</span>
          </div>
        </div>
      </section>

      <section class="nm-panel nm-toc-panel">
        <h2>目录</h2>
        <div id="toc" class="nm-toc"></div>
      </section>
    </div>
  </div>

  <script>
    const BASE_URL = (() => {
      const p = location.pathname;
      return p.endsWith('/') ? p : p.slice(0, p.lastIndexOf('/') + 1);
    })();

    function urlOf(path) {
      if (/^https?:\/\//i.test(path)) return path;
      return `${BASE_URL}${path}`.replace(/\/{2,}/g, '/');
    }

    const state = {
      notes: [],
      activeId: null,
      searchIndex: null,
    };

    const els = {
      noteList: document.getElementById('noteList'),
      searchInput: document.getElementById('searchInput'),
      topicFilter: document.getElementById('topicFilter'),
      sortSelect: document.getElementById('sortSelect'),
      detailTitle: document.getElementById('detailTitle'),
      detailMeta: document.getElementById('detailMeta'),
      detailTags: document.getElementById('detailTags'),
      toc: document.getElementById('toc'),
      preview: document.getElementById('preview'),
      statusText: document.getElementById('statusText'),
      loadIndexBtn: document.getElementById('loadIndexBtn'),
      fontDecBtn: document.getElementById('fontDecBtn'),
      fontIncBtn: document.getElementById('fontIncBtn'),
      lineDecBtn: document.getElementById('lineDecBtn'),
      lineIncBtn: document.getElementById('lineIncBtn'),
      themeToggleBtn: document.getElementById('themeToggleBtn'),
      tocToggleBtn: document.getElementById('tocToggleBtn'),
      tocAutoBtn: document.getElementById('tocAutoBtn'),
      wrapToggleBtn: document.getElementById('wrapToggleBtn'),
      focusToggleBtn: document.getElementById('focusToggleBtn'),
      resetReaderBtn: document.getElementById('resetReaderBtn'),
      progressBar: document.getElementById('progressBar'),
      widthRange: document.getElementById('widthRange'),
      lightbox: document.getElementById('lightbox'),
      lightboxImg: document.getElementById('lightboxImg'),
      lightboxClose: document.getElementById('lightboxClose'),
    };

    function setStatus(text) {
      els.statusText.textContent = text;
    }

    const readerPrefs = {
      fontSize: Number(localStorage.getItem('nm-font-size')) || 15,
      lineHeight: Number(localStorage.getItem('nm-line-height')) || 1.7,
      theme: localStorage.getItem('nm-theme') || 'dark',
      tocAuto: localStorage.getItem('nm-toc-auto') !== 'false',
      codeWrap: localStorage.getItem('nm-code-wrap') === 'true',
      focusMode: localStorage.getItem('nm-focus-mode') === 'true',
      width: Number(localStorage.getItem('nm-read-width')) || 900,
    };

    function applyReaderPrefs() {
      document.documentElement.style.setProperty('--nm-font-size', `${readerPrefs.fontSize}px`);
      document.documentElement.style.setProperty('--nm-line-height', readerPrefs.lineHeight);
      document.body.classList.toggle('theme-warm', readerPrefs.theme === 'warm');
      document.body.classList.toggle('focus-mode', readerPrefs.focusMode);
      document.documentElement.style.setProperty('--nm-read-width', `${readerPrefs.width}px`);
      if (els.themeToggleBtn) {
        els.themeToggleBtn.textContent = readerPrefs.theme === 'warm' ? '☀️' : '🌙';
      }
      if (els.tocAutoBtn) {
        els.tocAutoBtn.textContent = readerPrefs.tocAuto ? '折叠' : '展开';
      }
      if (els.wrapToggleBtn) {
        els.wrapToggleBtn.textContent = readerPrefs.codeWrap ? '不换行' : '换行';
      }
      if (els.focusToggleBtn) {
        els.focusToggleBtn.textContent = readerPrefs.focusMode ? '↩︎' : '🔍';
      }
      if (els.widthRange) {
        els.widthRange.value = readerPrefs.width;
      }
      document.querySelectorAll('.nm-preview pre').forEach(pre => {
        pre.classList.toggle('code-wrap', readerPrefs.codeWrap);
      });
    }

    function updateReaderPrefs(deltaSize, deltaLine) {
      readerPrefs.fontSize = Math.min(20, Math.max(12, readerPrefs.fontSize + deltaSize));
      readerPrefs.lineHeight = Math.min(2.2, Math.max(1.4, +(readerPrefs.lineHeight + deltaLine).toFixed(2)));
      localStorage.setItem('nm-font-size', readerPrefs.fontSize);
      localStorage.setItem('nm-line-height', readerPrefs.lineHeight);
      applyReaderPrefs();
    }

    async function loadIndex() {
      try {
        setStatus('正在加载索引...');
        const res = await fetch(urlOf('data/search.json'), { cache: 'no-store' });
        if (!res.ok) throw new Error('无法读取 data/search.json');
        const json = await res.json();
        state.searchIndex = json;
        state.notes = json.items || [];
        setStatus(`已加载 ${state.notes.length} 条记录`);
        renderTopics();
        renderList();
      } catch (err) {
        console.error(err);
        setStatus('加载失败，请检查 data/search.json');
      }
    }

    function renderTopics() {
      const topics = Array.from(new Set(state.notes.map(n => n.topic).filter(Boolean))).sort();
      els.topicFilter.innerHTML = '<option value="">全部主题</option>' + topics.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    function getFilteredNotes() {
      const query = els.searchInput.value.trim().toLowerCase();
      const topic = els.topicFilter.value;
      const sortBy = els.sortSelect.value;

      let list = [...state.notes];
      if (topic) list = list.filter(note => note.topic === topic);
      if (query) {
        list = list.filter(note => {
          const haystack = `${note.title} ${note.text} ${(note.tags || []).join(' ')}`.toLowerCase();
          return haystack.includes(query);
        });
      }

      if (sortBy === 'title') {
        list.sort((a, b) => a.title.localeCompare(b.title, 'zh-Hans-CN'));
      } else {
        list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      }

      return list;
    }

    function renderList() {
      const list = getFilteredNotes();
      if (!list.length) {
        els.noteList.innerHTML = '<div class="nm-note-card" role="status" aria-live="polite">没有匹配的笔记</div>';
        return;
      }
      els.noteList.innerHTML = list.map((note, index) => {
        const isActive = note.id === state.activeId;
        return `
          <div class="nm-note-card ${isActive ? 'active' : ''}" data-id="${note.id}" tabindex="0" role="button" aria-label="阅读: ${note.title}" data-index="${index}">
            <h3>${note.title}</h3>
            <div class="nm-note-meta">
              <span>ID: ${note.id}</span>
              <span>主题: ${note.topic || '未分类'}</span>
              <span>更新: ${note.updatedAt}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function slugifyHeading(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\-\u4e00-\u9fa5]/g, '')
        .replace(/\-+/g, '-');
    }

    function buildToc(content) {
      const lines = content.split('\n');
      const items = [];
      lines.forEach(line => {
        const match = /^(#{1,3})\s+(.*)$/.exec(line.trim());
        if (!match) return;
        const level = match[1].length;
        const title = match[2].trim();
        const id = slugifyHeading(title);
        items.push({ level, title, id });
      });
      if (!items.length) {
        els.toc.style.display = 'none';
        els.toc.innerHTML = '';
        return;
      }
      const groups = [];
      let current = null;
      items.forEach(item => {
        if (item.level === 1 || item.level === 2) {
          current = { head: item, children: [] };
          groups.push(current);
        } else if (current) {
          current.children.push(item);
        }
      });

      const list = groups.map(group => {
        const head = group.head;
        const headClass = head.level === 1 ? '' : 'toc-h2';
        const children = group.children.map(child => (
          `<li class="toc-h3"><a href="#${child.id}">${child.title}</a></li>`
        )).join('');
        return `
          <li class="toc-group">
            <div class="toc-toggle" data-target="${head.id}">
              <a class="${headClass}" href="#${head.id}">${head.title}</a>
            </div>
            ${children ? `<ul>${children}</ul>` : ''}
          </li>
        `;
      }).join('');

      els.toc.innerHTML = `<strong>目录</strong><ul>${list}</ul>`;
      els.toc.style.display = 'block';
    }

    function initScrollSpy() {
      if (!els.toc || els.toc.style.display === 'none') return;
      const headings = Array.from(els.preview.querySelectorAll('h1, h2, h3'));
      if (!headings.length) return;
      const tocLinks = Array.from(els.toc.querySelectorAll('a'));
      const map = new Map(tocLinks.map(link => [decodeURIComponent(link.getAttribute('href').slice(1)), link]));

      const onScroll = () => {
        let current = headings[0];
        const offset = 120;
        headings.forEach(h => {
          if (h.getBoundingClientRect().top - offset <= 0) current = h;
        });
        tocLinks.forEach(link => link.classList.remove('active'));
        const activeLink = map.get(current.id);
        if (activeLink) {
          activeLink.classList.add('active');
          const activeGroup = activeLink.closest('.toc-group');
          if (readerPrefs.tocAuto) {
            document.querySelectorAll('.toc-group').forEach(group => {
              if (group === activeGroup) {
                group.classList.remove('collapsed');
              } else {
                group.classList.add('collapsed');
              }
            });
          }
        }
      };

      window.removeEventListener('scroll', window.__tocScrollHandler);
      window.__tocScrollHandler = onScroll;
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }

    function bindTocToggles() {
      if (!els.toc) return;
      els.toc.querySelectorAll('.toc-toggle').forEach(toggle => {
        toggle.addEventListener('click', (e) => {
          if (e.target.tagName.toLowerCase() === 'a') return;
          const parent = toggle.closest('.toc-group');
          if (parent) parent.classList.toggle('collapsed');
        });
      });
    }

    // 防抖函数
    function debounce(fn, delay = 300) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    // 节流函数
    function throttle(fn, limit = 100) {
      let inThrottle;
      return (...args) => {
        if (!inThrottle) {
          fn.apply(this, args);
          inThrottle = true;
          setTimeout(() => inThrottle = false, limit);
        }
      };
    }

    // 防抖和节流的列表渲染、进度更新
    const renderListDebounced = debounce(renderList, 150);
    const updateProgressThrottled = throttle(function updateProgress() {
      if (!els.progressBar) return;
      const doc = document.documentElement;
      const total = doc.scrollHeight - doc.clientHeight;
      const scrolled = total > 0 ? (doc.scrollTop / total) * 100 : 0;
      els.progressBar.style.width = `${Math.min(100, Math.max(0, scrolled))}%`;
    }, 50);

    // 键盘快捷键处理
    function handleKeyboardShortcuts(e) {
      const target = e.target;
      if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.tagName === 'SELECT') return;

      const key = e.key.toLowerCase();

      // j/k 导航笔记列表
      if (key === 'j') {
        e.preventDefault();
        navigateList(1);
      } else if (key === 'k') {
        e.preventDefault();
        navigateList(-1);
      }
      // Ctrl/Cmd + G 聚焦搜索框
      else if (key === 'g' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        els.searchInput.focus();
      }
      // Ctrl/Cmd + R 重新加载
      else if (key === 'r' && (e.ctrlKey || e.metaKey) && e.shiftKey) {
        e.preventDefault();
        loadIndex();
      }
      // Esc 清除搜索
      else if (key === 'escape') {
        if (document.activeElement === els.searchInput) {
          els.searchInput.value = '';
          els.searchInput.blur();
          renderListDebounced();
        }
      }
      // t 切换主题
      else if (key === 't' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        els.themeToggleBtn.click();
      }
      // w 切换代码换行
      else if (key === 'w' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        els.wrapToggleBtn.click();
      }
      // f 切换专注模式
      else if (key === 'f' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        els.focusToggleBtn.click();
      }
    }

    // 笔记列表导航
    function navigateList(direction) {
      const cards = Array.from(els.noteList.querySelectorAll('.nm-note-card'));
      if (!cards.length) return;
      const currentIndex = cards.findIndex(card => card.classList.contains('active'));
      let nextIndex = direction > 0 ? currentIndex + 1 : currentIndex - 1;
      if (nextIndex >= cards.length) nextIndex = 0;
      if (nextIndex < 0) nextIndex = cards.length - 1;
      setActiveNote(cards[nextIndex].dataset.id);
      cards[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      cards[nextIndex].focus();
    }

    function updateProgress() {
      if (!els.progressBar) return;
      const doc = document.documentElement;
      const total = doc.scrollHeight - doc.clientHeight;
      const scrolled = total > 0 ? (doc.scrollTop / total) * 100 : 0;
      els.progressBar.style.width = `${Math.min(100, Math.max(0, scrolled))}%`;
    }

    function highlightCode(code, lang) {
      const escaped = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // 语言特定的关键字和规则
      const langRules = {
        javascript: {
          keywords: ['const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while', 'switch', 'case', 'break', 'continue', 'class', 'new', 'try', 'catch', 'finally', 'throw', 'async', 'await', 'import', 'export', 'from', 'default', 'extends', 'super', 'this', 'true', 'false', 'null', 'undefined', 'typeof', 'instanceof', 'delete', 'void', 'in', 'of', 'do', 'typeof'],
          builtins: ['console', 'window', 'document', 'Array', 'Object', 'String', 'Number', 'Boolean', 'Date', 'Math', 'JSON', 'Promise', 'Set', 'Map', 'Error', 'RegExp', 'setTimeout', 'setInterval', 'clearTimeout', 'clearInterval', 'fetch'],
        },
        python: {
          keywords: ['def', 'class', 'return', 'if', 'elif', 'else', 'for', 'while', 'break', 'continue', 'try', 'except', 'finally', 'raise', 'import', 'from', 'as', 'pass', 'global', 'nonlocal', 'lambda', 'yield', 'with', 'True', 'False', 'None', 'and', 'or', 'not', 'in', 'is', 'assert', 'del', 'async', 'await'],
          builtins: ['print', 'len', 'range', 'list', 'dict', 'set', 'tuple', 'str', 'int', 'float', 'bool', 'open', 'input', 'type', 'isinstance', 'hasattr', 'getattr', 'setattr', 'dir'],
        },
        html: {
          keywords: ['<!DOCTYPE', '<html', '<head', '<body', '<div', '<span', '<p', '<a', '<img', '<script', '<style', '<link', '<meta', '<title', '<header', '<footer', '<nav', '<section', '<article', '<aside', '<main', '<form', '<input', '<button', '<select', '<option', '<textarea', '<label', '<table', '<tr', '<td', '<th'],
        },
        css: {
          keywords: ['@import', '@media', '@keyframes', '@font-face', '@supports'],
        },
        typescript: {
          keywords: ['const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while', 'switch', 'case', 'break', 'continue', 'class', 'interface', 'type', 'enum', 'new', 'try', 'catch', 'finally', 'throw', 'async', 'await', 'import', 'export', 'from', 'default', 'extends', 'implements', 'super', 'this', 'true', 'false', 'null', 'undefined', 'typeof', 'instanceof', 'private', 'public', 'protected', 'readonly', 'static', 'abstract'],
          builtins: ['console', 'window', 'document', 'Array', 'Object', 'String', 'Number', 'Boolean', 'Date', 'Math', 'JSON', 'Promise', 'Set', 'Map', 'Error', 'RegExp'],
        },
      };

      const rules = langRules[lang] || langRules.javascript;

      const patterns = [
        { re: /(\/\/.*$)/gm, cls: 'com' },
        { re: /(\/\*[\s\S]*?\*\/)/gm, cls: 'com' },
        { re: /(["'`])(?:\\.|(?!\1).)*\1/gm, cls: 'str' },
        { re: /\b(\d+(\.\d+)?([eE][+-]?\d+)?)\b/gm, cls: 'num' },
      ];

      let output = escaped;

      // 先处理注释（避免在关键字中误匹配）
      patterns.forEach(({ re, cls }) => {
        output = output.replace(re, `<span class="${cls}">$1</span>`);
      });

      // 处理关键字
      const keywords = rules.keywords.join('|');
      const kwRegex = new RegExp(`\\b(${keywords})\\b`, 'g');
      output = output.replace(kwRegex, '<span class="kw">$1</span>');

      // 处理内置对象/函数
      if (rules.builtins) {
        const builtins = rules.builtins.join('|');
        const builtinRegex = new RegExp(`\\b(${builtins})\\b`, 'g');
        output = output.replace(builtinRegex, '<span class="bi">$1</span>');
      }

      // 处理函数调用
      output = output.replace(/\b([A-Za-z_][A-Za-z0-9_]*)\s*(?=\()/g, '<span class="fn">$1</span>');

      // 处理 CSS 特殊语法
      if (lang === 'css') {
        output = output.replace(/([.#]?[a-zA-Z_][a-zA-Z0-9_-]*)\s*\{/g, '<span class="sel">$1</span>{');
        output = output.replace(/([a-zA-Z-]+)\s*:/g, '<span class="prop">$1</span>:');
      }

      return output;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function renderInline(text) {
      const codeTokens = [];
      let html = escapeHtml(text);

      html = html.replace(/`([^`]+)`/g, (_, code) => {
        const token = `@@INLINECODE${codeTokens.length}@@`;
        codeTokens.push(`<code>${code}</code>`);
        return token;
      });

      html = html
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" />')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

      codeTokens.forEach((block, idx) => {
        html = html.replace(`@@INLINECODE${idx}@@`, block);
      });
      return html;
    }

    function parseMarkdown(content) {
      const lines = (content || '').split('\n');
      const out = [];
      let inCode = false;
      let codeLang = '';
      let codeBuffer = [];
      let paragraph = [];
      const listStack = [];

      const isTableSeparator = (value) => {
        return /^\s*\|?(\s*:?-{3,}:?\s*\|)+\s*:?-{3,}:?\s*\|?\s*$/.test(value);
      };

      const splitRow = (value) => {
        return value
          .trim()
          .replace(/^\|/, '')
          .replace(/\|$/, '')
          .split('|')
          .map(cell => cell.trim());
      };

      const parseTable = (startIndex) => {
        const headerCells = splitRow(lines[startIndex]);
        const alignTokens = splitRow(lines[startIndex + 1]);
        const aligns = alignTokens.map(token => {
          const trimmed = token.trim();
          const isLeft = trimmed.startsWith(':');
          const isRight = trimmed.endsWith(':');
          if (isLeft && isRight) return 'center';
          if (isRight) return 'right';
          if (isLeft) return 'left';
          return '';
        });

        const thead = `<thead><tr>${headerCells.map((cell, idx) => {
          const align = aligns[idx] ? ` style="text-align:${aligns[idx]}"` : '';
          return `<th${align}>${renderInline(cell)}</th>`;
        }).join('')}</tr></thead>`;

        const bodyRows = [];
        let i = startIndex + 2;
        for (; i < lines.length; i += 1) {
          const rowLine = lines[i];
          if (!rowLine.trim() || !rowLine.includes('|')) break;
          const cells = splitRow(rowLine);
          bodyRows.push(`<tr>${cells.map((cell, idx) => {
            const align = aligns[idx] ? ` style="text-align:${aligns[idx]}"` : '';
            return `<td${align}>${renderInline(cell)}</td>`;
          }).join('')}</tr>`);
        }
        const tbody = bodyRows.length ? `<tbody>${bodyRows.join('')}</tbody>` : '';
        return { html: `<table>${thead}${tbody}</table>`, nextIndex: i - 1 };
      };

      const closeLists = () => {
        while (listStack.length) {
          const last = listStack.pop();
          out.push(`</${last.type}>`);
        }
      };

      const closeListsToIndent = (indent) => {
        while (listStack.length && listStack[listStack.length - 1].indent >= indent) {
          const last = listStack.pop();
          out.push(`</${last.type}>`);
        }
      };

      const flushParagraph = () => {
        if (!paragraph.length) return;
        const text = paragraph.join('<br>');
        out.push(`<p>${renderInline(text)}</p>`);
        paragraph = [];
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i].replace(/\r$/, '');

        if (line.startsWith('```')) {
          if (inCode) {
            const klass = codeLang ? ` class="lang-${codeLang}"` : '';
            const highlighted = highlightCode(codeBuffer.join('\n'), codeLang);
            out.push(`<pre><code${klass}>${highlighted}</code></pre>`);
            inCode = false;
            codeLang = '';
            codeBuffer = [];
          } else {
            flushParagraph();
            closeLists();
            inCode = true;
            codeLang = line.slice(3).trim();
          }
          continue;
        }

        if (inCode) {
          codeBuffer.push(line);
          continue;
        }

        if (!line.trim()) {
          flushParagraph();
          closeLists();
          continue;
        }

        if (line.includes('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1])) {
          flushParagraph();
          closeLists();
          const { html: tableHtml, nextIndex } = parseTable(i);
          out.push(tableHtml);
          i = nextIndex;
          continue;
        }

        const headingMatch = line.match(/^(#{1,3})\s+(.*)$/);
        if (headingMatch) {
          flushParagraph();
          closeLists();
          const level = headingMatch[1].length;
          const title = headingMatch[2].trim();
          const id = slugifyHeading(title);
          out.push(`<h${level} id="${id}">${renderInline(title)}</h${level}>`);
          continue;
        }

        const blockquoteMatch = line.match(/^>\s+(.*)$/);
        if (blockquoteMatch) {
          flushParagraph();
          closeLists();
          out.push(`<blockquote>${renderInline(blockquoteMatch[1])}</blockquote>`);
          continue;
        }

        if (/^\s*[-*+]\s+/.test(line) || /^\s*\d+\.\s+/.test(line)) {
          flushParagraph();
          const isOrdered = /^\s*\d+\.\s+/.test(line);
          const indentMatch = line.match(/^(\s*)/);
          const indent = indentMatch ? indentMatch[1].length : 0;
          const type = isOrdered ? 'ol' : 'ul';
          let content = line.replace(/^\s*[-*+]\s+/, '').replace(/^\s*\d+\.\s+/, '');

          if (!listStack.length || indent > listStack[listStack.length - 1].indent) {
            out.push(`<${type}>`);
            listStack.push({ type, indent });
          } else if (indent === listStack[listStack.length - 1].indent) {
            if (listStack[listStack.length - 1].type !== type) {
              closeListsToIndent(indent);
              out.push(`<${type}>`);
              listStack.push({ type, indent });
            }
          } else {
            closeListsToIndent(indent);
            if (!listStack.length || listStack[listStack.length - 1].type !== type) {
              out.push(`<${type}>`);
              listStack.push({ type, indent });
            }
          }

          const taskMatch = content.match(/^\[( |x|X)\]\s+(.*)$/);
          if (taskMatch) {
            const checked = taskMatch[1].toLowerCase() === 'x';
            const taskText = taskMatch[2];
            const checkbox = `<input type="checkbox" disabled${checked ? ' checked' : ''}>`;
            out.push(`<li class="task-item">${checkbox} ${renderInline(taskText)}</li>`);
          } else {
            out.push(`<li>${renderInline(content)}</li>`);
          }
          continue;
        }

        paragraph.push(line);
      }

      if (inCode) {
        const klass = codeLang ? ` class="lang-${codeLang}"` : '';
        const highlighted = highlightCode(codeBuffer.join('\n'), codeLang);
        out.push(`<pre><code${klass}>${highlighted}</code></pre>`);
      }

      flushParagraph();
      closeLists();
      return out.join('\n');
    }

    function renderPreview(content) {
      buildToc(content || '');
      let html = parseMarkdown(content || '');
      let pIndex = 0;
      html = html.replace(/<p>(.*?)<\/p>/g, (_, text) => {
        const pid = `p-${pIndex++}`;
        return `<p id="${pid}" class="anchor">${text}</p>`;
      });
      els.preview.innerHTML = html;
      initScrollSpy();
      bindTocToggles();
      bindLightbox();
      bindParagraphAnchors();
      applyReaderPrefs();
    }

    function bindLightbox() {
      if (!els.lightbox || !els.lightboxImg) return;
      els.preview.querySelectorAll('img').forEach(img => {
        img.addEventListener('click', () => {
          els.lightboxImg.src = img.src;
          els.lightbox.classList.add('open');
          els.lightbox.setAttribute('aria-hidden', 'false');
        });
      });
    }

    function closeLightbox() {
      els.lightbox.classList.remove('open');
      els.lightbox.setAttribute('aria-hidden', 'true');
      els.lightboxImg.src = '';
    }

    function bindParagraphAnchors() {
      els.preview.querySelectorAll('p.anchor').forEach(p => {
        p.addEventListener('click', () => {
          els.preview.querySelectorAll('p.anchor').forEach(node => node.classList.remove('active'));
          p.classList.add('active');
          history.replaceState(null, '', `${location.pathname}${location.search}#${p.id}`);
        });
      });
    }

    function saveScrollPosition(id) {
      if (!id) return;
      const pos = document.documentElement.scrollTop || document.body.scrollTop || 0;
      localStorage.setItem(`nm-scroll-${id}`, String(pos));
    }

    function restoreScrollPosition(id) {
      if (!id) return;
      const saved = Number(localStorage.getItem(`nm-scroll-${id}`));
      if (Number.isFinite(saved) && saved > 0) {
        requestAnimationFrame(() => window.scrollTo({ top: saved, behavior: 'auto' }));
      }
    }

    async function setActiveNote(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;
      if (state.activeId && state.activeId !== id) {
        saveScrollPosition(state.activeId);
      }
      state.activeId = id;
      els.detailTitle.textContent = note.title;
      els.detailMeta.innerHTML = `
        <span>ID: ${note.id}</span>
        <span>主题: ${note.topic || '未分类'}</span>
        <span>更新: ${note.updatedAt || '-'}</span>
      `;
      els.detailTags.innerHTML = (note.tags || []).map(tag => `<span class="nm-tag">${tag}</span>`).join('');
      if (!note.content && note.path) {
        try {
          const res = await fetch(urlOf(note.path), { cache: 'no-store' });
          if (!res.ok) throw new Error('无法读取 Markdown 文件');
          note.content = await res.text();
        } catch (err) {
          console.error(err);
          els.preview.innerHTML = '<div class="nm-loading" role="status" aria-live="assertive">读取 Markdown 失败，请检查路径。</div>';
          renderListDebounced();
          return;
        }
      }
      renderPreview(note.content || '');
      if (!scrollToAnchorHash()) {
        restoreScrollPosition(id);
      }
      renderListDebounced();
    }

    function scrollToAnchorHash() {
      const hash = decodeURIComponent(location.hash || '');
      if (!hash.startsWith('#p-')) return false;
      const anchor = document.getElementById(hash.slice(1));
      if (anchor) {
        anchor.scrollIntoView({ behavior: 'auto', block: 'start' });
        anchor.classList.add('active');
        return true;
      }
      return false;
    }

    els.noteList.addEventListener('click', (e) => {
      const card = e.target.closest('.nm-note-card');
      if (!card || !card.dataset.id) return;
      setActiveNote(card.dataset.id);
    });

    // 键盘导航支持
    els.noteList.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        const card = e.target.closest('.nm-note-card');
        if (card && card.dataset.id) {
          e.preventDefault();
          setActiveNote(card.dataset.id);
        }
      }
    });

    // 使用防抖的列表渲染
    ['input', 'change'].forEach(evt => {
      els.searchInput.addEventListener(evt, renderListDebounced);
      els.topicFilter.addEventListener(evt, renderListDebounced);
      els.sortSelect.addEventListener(evt, renderListDebounced);
    });

    // 按钮事件
    els.loadIndexBtn.addEventListener('click', loadIndex);
    els.fontDecBtn.addEventListener('click', () => updateReaderPrefs(-1, 0));
    els.fontIncBtn.addEventListener('click', () => updateReaderPrefs(1, 0));
    els.lineDecBtn.addEventListener('click', () => updateReaderPrefs(0, -0.1));
    els.lineIncBtn.addEventListener('click', () => updateReaderPrefs(0, 0.1));
    els.themeToggleBtn.addEventListener('click', () => {
      readerPrefs.theme = readerPrefs.theme === 'warm' ? 'dark' : 'warm';
      localStorage.setItem('nm-theme', readerPrefs.theme);
      applyReaderPrefs();
    });
    els.tocToggleBtn.addEventListener('click', () => {
      const panel = document.querySelector('.nm-toc-panel');
      if (panel) {
        panel.classList.toggle('open');
        panel.hidden = !panel.classList.contains('open');
      }
    });
    els.tocAutoBtn.addEventListener('click', () => {
      readerPrefs.tocAuto = !readerPrefs.tocAuto;
      localStorage.setItem('nm-toc-auto', String(readerPrefs.tocAuto));
      applyReaderPrefs();
    });
    els.wrapToggleBtn.addEventListener('click', () => {
      readerPrefs.codeWrap = !readerPrefs.codeWrap;
      localStorage.setItem('nm-code-wrap', String(readerPrefs.codeWrap));
      applyReaderPrefs();
    });
    els.widthRange.addEventListener('input', (e) => {
      readerPrefs.width = Number(e.target.value);
      localStorage.setItem('nm-read-width', String(readerPrefs.width));
      applyReaderPrefs();
    });
    els.focusToggleBtn.addEventListener('click', () => {
      readerPrefs.focusMode = !readerPrefs.focusMode;
      localStorage.setItem('nm-focus-mode', String(readerPrefs.focusMode));
      applyReaderPrefs();
    });
    els.resetReaderBtn.addEventListener('click', () => {
      readerPrefs.fontSize = 15;
      readerPrefs.lineHeight = 1.7;
      readerPrefs.theme = 'dark';
      localStorage.removeItem('nm-font-size');
      localStorage.removeItem('nm-line-height');
      localStorage.removeItem('nm-theme');
      localStorage.removeItem('nm-toc-auto');
      localStorage.removeItem('nm-code-wrap');
      localStorage.removeItem('nm-focus-mode');
      localStorage.removeItem('nm-read-width');
      readerPrefs.tocAuto = true;
      readerPrefs.codeWrap = false;
      readerPrefs.focusMode = false;
      readerPrefs.width = 900;
      applyReaderPrefs();
    });

    els.lightbox.addEventListener('click', (e) => {
      if (e.target === els.lightbox) closeLightbox();
    });
    els.lightboxClose.addEventListener('click', closeLightbox);

    // 全局键盘快捷键
    document.addEventListener('keydown', handleKeyboardShortcuts);

    // 初始化
    applyReaderPrefs();
    loadIndex();
    window.addEventListener('scroll', updateProgressThrottled, { passive: true });
    updateProgressThrottled();
    window.addEventListener('beforeunload', () => saveScrollPosition(state.activeId));
  </script>
</body>
</html>
