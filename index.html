<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Alsay - 个人展示页面">
    <meta name="author" content="Alsay">
    <title>Alsay - 欢迎访问</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --text-color: #333;
            --text-light: #666;
            --bg-color: #f8f9fa;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-color);
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: var(--white);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .description {
            color: var(--text-light);
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-link {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        footer {
            background: rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
        }

        footer a {
            color: var(--white);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        footer a:hover {
            opacity: 0.8;
        }

        .footer-content p {
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }

        .icp-info {
            opacity: 0.8;
        }

        /* Skills Section */
        .skills {
            margin: 2rem 0;
            text-align: left;
        }

        .skills-title {
            font-size: 0.9rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }

        .skill-tag {
            padding: 0.4rem 0.8rem;
            background: var(--bg-color);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-color);
            transition: all 0.3s ease;
            cursor: default;
        }

        .skill-tag:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
            transform: scale(1.05);
        }

        .skill-tag.highlight {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
        }

        @media (max-width: 480px) {
            .card {
                padding: 2rem;
                margin: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .avatar {
                width: 100px;
                height: 100px;
                font-size: 2.5rem;
            }

            .skill-tag {
                font-size: 0.8rem;
                padding: 0.3rem 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="avatar">👋</div>
            <h1>欢迎来到 Alsay</h1>
            <p class="tagline">探索 · 创造 · 分享</p>
            <p class="description">

            <div class="skills">

                    <span class="skill-tag">HTML/CSS</span>
                    <span class="skill-tag">Git</span>
                    <span class="skill-tag">Docker</span>
                </div>
            </div>

                    </svg>
                </a>
                <a href="mailto:contact@alsay.net" class="social-link" title="Email">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

                    </svg>
                </a>
            </div>
            <div class="status">
                <span class="status-dot"></span>
                网站正常运行中
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>
                安全检测能力由 
                <a href="https://waf-ce.chaitin.cn/" target="_blank">雷池 WAF</a> 
                驱动
            </p>
            <p class="icp-info">备案号：皖ICP备2025082417号-1</p>
            <p class="copyright">© 2025 Alsay.net, Inc.</p>
        </div>
    </footer>
</body>
</html>
